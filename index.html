    /* Critical above-the-fold CSS */

      border: 3px solid #f0f9f7;
      border-top-color: #4A9B8E;
      border-radius: 50%;
      animation: spinner 0.8s linear infinite;
    }
    
    @keyframes spinner {

    }
    
    /* Skip link */

      position: absolute;
      top: -100%;
      left: 50%;
      transform: translateX(-50%);
      background: #4A9B8E;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      z-index: 9999;
      transition: top 0.2s;
    }
    
    .skip-link:focus {
      top: 1rem;
    }
  </style>
